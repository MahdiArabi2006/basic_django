server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
    }

     location /admin/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
    }

    location /static/ {
        alias /usr/share/nginx/html/static/;
    }

    location /assets/ {
    	root /usr/share/nginx/html;
    	expires 1y;
    	add_header Cache-Control "public, immutable";
    }
}
